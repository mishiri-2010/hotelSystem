<!DOCTYPE html>
<html lang="en">
<head>
    <style>
       
        .blue-heaven-contact {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: rgba(255, 255, 255, 0.95);
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
           
            margin-left: 50px;
            margin-top: 50px;
        }

        .blue-heaven-contact h2 {
            color: #004085;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .blue-heaven-contact p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .contact-details {
            text-align: left;
            margin-bottom: 30px;
            display: inline-block;
        }

        .detail-item {
            margin: 10px 0;
            color: #333;
            font-size: 16px;
        }

       
        .contact-button {
            display: inline-block;
            background-color: #007bff; 
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            width: 100%;
        }

        .contact-button:hover {
            background-color: #0056b3; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="blue-heaven-contact">
        <h2>Blue Heaven Resort & Spa</h2>
        <p>
            Experience ultimate tranquility where the sky meets the sea. 
            Our luxury resort offers a sanctuary of peace, world-class spa treatments, 
            and breathtaking views of the horizon.
        </p>

        <div class="contact-details">
            <div class="detail-item"><strong> Address:</strong> Mangochi , Malawi</div>
            <div class="detail-item"><strong> Phone:</strong> 099400867</div>
            <div class="detail-item"><strong> Email:</strong> info@blueheaven.com</div>
        </div>

        <button class="contact-button">Contact Our team</button>
    </div>

</body>
</html>
